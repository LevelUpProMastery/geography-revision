<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Geography - Coastal Landscapes</title>
<style>
:root{--dark:#061a12;--green:#0B2E1F;--green2:#0F3D2E;--gold:#C89B2A;--white:#fff}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#000,var(--dark),var(--green));color:var(--white)}header{text-align:center;padding:30px 20px;background:#020705;border-bottom:3px solid var(--gold)}.logo{max-width:260px;width:80%;margin-bottom:15px}h1{margin:10px 0 5px;font-size:46px;font-weight:800}.subtitle{color:#e5e7eb}main{max-width:1100px;margin:auto;padding:25px}.screen{display:none}.screen.active{display:block}.topic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:25px}.topic-card{background:var(--gold);color:#061a12;padding:22px;border-radius:16px;cursor:pointer;font-weight:bold;box-shadow:0 8px 20px rgba(0,0,0,.35)}.topic-card:hover{transform:translateY(-4px)}.panel{background:var(--gold);color:#061a12;padding:22px;border-radius:16px;margin-bottom:20px}button{border:none;padding:12px 16px;border-radius:10px;cursor:pointer;font-weight:bold}.back-button{background:var(--gold);color:#061a12;margin-bottom:20px}.tabs{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}.tabs button{background:var(--green2);color:white;border:2px solid var(--gold)}.tabs button.active{background:var(--gold);color:#061a12}.tab{display:none}.tab.active{display:block}.content-box,.exam-box{background:var(--green2);color:white;padding:18px;border-radius:14px;margin-bottom:16px;border-left:5px solid var(--gold);line-height:1.6}.flashcard{background:var(--green2);color:white;border:3px dashed var(--gold);padding:35px;text-align:center;font-size:22px;border-radius:16px;cursor:pointer;min-height:130px;display:flex;align-items:center;justify-content:center}.exam-card{margin-bottom:25px}.exam-box{padding:16px;margin:12px 0}.badge{display:inline-block;background:var(--gold);color:#061a12;padding:6px 10px;border-radius:999px;font-weight:bold;margin-bottom:8px}textarea{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px;font-size:16px}.feedback{padding:12px;border-radius:10px;margin-top:10px}.www{background:#064e3b;color:white}.ebi{background:#78350f;color:white}.score{background:#1e3a8a;color:white}
</style>
</head>
<body>
<header><img class="logo" src="https://leveluppromastery.github.io/Flashcards/logo.png" alt="Level Up Logo"><h1>Coastal Landscapes</h1><p class="subtitle">GCSE Geography Revision</p></header>
<main>
<section id="menuScreen" class="screen active"><div class="panel"><h2>Choose a Coastal Landscapes Topic</h2><p>Click a topic to open notes, flashcards, example answers and practice questions.</p></div><div class="topic-grid" id="topicGrid"></div></section>
<section id="topicScreen" class="screen"><button class="back-button" onclick="goBack()">← Back to Coastal Topics</button><div class="panel"><h2 id="topicTitle"></h2><p id="topicIntro"></p></div><div class="tabs"><button class="active" onclick="showTab('notesTab',this)">Notes</button><button onclick="showTab('flashcardsTab',this)">Flashcards</button><button onclick="showTab('examplesTab',this)">Example Answers</button><button onclick="showTab('practiceTab',this)">Exam Practice</button></div><div id="notesTab" class="tab active"><div id="notesContent"></div></div><div id="flashcardsTab" class="tab"><div class="flashcard" onclick="flipCard()"><span id="flashcardText"></span></div><br><button onclick="previousCard()">Previous</button> <button onclick="nextCard()">Next</button></div><div id="examplesTab" class="tab"><div id="exampleContent"></div></div><div id="practiceTab" class="tab"><div id="practiceContent"></div></div></section>
</main>
<script>
function cb(t){return `<div class="content-box">${t}</div>`}
const topics=[
{id:"management",title:"Coastal Management",intro:"Hard engineering, soft engineering and the Holderness Coast case study.",notes:cb(`<h3>Overview</h3><p>Managing coastlines is difficult because different areas have different needs. Coastal management techniques are divided into hard engineering and soft engineering.</p>`)+cb(`<h3>Hard Engineering</h3><p>Hard engineering uses man-made structures to control the sea.</p><ul><li><strong>Sea wall:</strong> Reflects wave energy. Very effective but expensive and visually unattractive.</li><li><strong>Gabions:</strong> Wire cages filled with rocks. Cheap and absorb wave energy but can look unattractive.</li><li><strong>Groynes:</strong> Built at right angles to the beach to trap sediment. They build up beaches but can starve areas further down the coast.</li><li><strong>Rock armour:</strong> Large rocks placed at the cliff base to absorb wave energy. Effective but can look unnatural.</li></ul>`)+cb(`<h3>Soft Engineering</h3><ul><li><strong>Beach nourishment:</strong> Sand is added to beaches. It protects tourism but needs repeating.</li><li><strong>Managed retreat:</strong> Low-value land is allowed to flood or erode naturally.</li><li><strong>Cliff stabilisation:</strong> Vegetation and matting are used to reduce erosion.</li><li><strong>Do nothing:</strong> No action is taken. It is cheap but can lead to loss of homes, land and businesses.</li></ul>`)+cb(`<h3>Case Study: Holderness Coast</h3><p>The Holderness Coast is in East Yorkshire and is one of the fastest eroding coastlines in the world. In some areas, erosion reaches around 5 metres per year. The cliffs are made from soft boulder clay.</p><ul><li>29 villages have been lost in 1000 years.</li><li>Farmers are losing farmland.</li><li>Holbeck Hall Hotel collapsed into the sea in 1993.</li><li>£2 million was spent on rock armour and groynes at Mappleton.</li></ul>`),flashcards:[["What is hard engineering?","Man-made structures used to control the sea."],["What are groynes used for?","To trap sediment and build up the beach."],["What is soft engineering?","Working with natural processes to manage the coast."],["Why does Holderness erode quickly?","The cliffs are made from soft boulder clay."]],examples:[{marks:2,question:"Give two examples of hard engineering used to protect the coast. [2 marks]",instructions:"Give two correct examples.",model:"Two examples of hard engineering are sea walls and groynes."},{marks:4,question:"Explain one advantage and one disadvantage of using rock armour. [4 marks]",instructions:"Make one point about an advantage and explain it. Then make one point about a disadvantage and explain it.",model:"One advantage of rock armour is that large rocks absorb wave energy, reducing erosion. One disadvantage is that it can look unattractive, which may reduce tourism."},{marks:6,question:"Explain how groynes affect coastal processes. [6 marks]",instructions:"Use longshore drift, sediment, beach, wave energy and erosion.",model:"Groynes trap sediment moved by longshore drift, building up the beach. A wider beach absorbs more wave energy, reducing erosion. However, beaches further down the coast may receive less sediment and erode more."}],practice:[{question:"Give two examples of soft engineering. [2 marks]",markPoints:["beach nourishment","managed retreat","cliff stabilisation","do nothing"]},{question:"Explain one advantage and one disadvantage of using a sea wall. [4 marks]",markPoints:["reflect","wave energy","flooding","erosion","expensive","unattractive"]}]},
{id:"erosion",title:"Processes of Erosion",intro:"Hydraulic action, abrasion, attrition and corrosion.",notes:cb(`<h3>Hydraulic Action</h3><p>Waves force water and air into cracks in the rock. Pressure builds, then air expands as the wave retreats, weakening the rock until it shatters.</p>`)+cb(`<h3>Abrasion / Corrasion</h3><p>Breaking waves throw sand, pebbles and boulders against the cliff face. These scrape the rock like sandpaper and cause undercutting.</p>`)+cb(`<h3>Attrition</h3><p>Rocks and boulders collide with each other and the rock face. They become smaller, smoother and more rounded.</p>`)+cb(`<h3>Corrosion / Solution</h3><p>Sea water dissolves soluble minerals, especially in limestone and chalk coasts.</p>`),flashcards:[["What is hydraulic action?","Waves force air and water into cracks, weakening rock."],["What is abrasion?","Material thrown by waves scrapes against cliffs."],["What is attrition?","Rocks collide and become smaller and rounder."],["What is corrosion?","Sea water dissolves soluble minerals in rock."]],examples:[{marks:4,question:"Explain one process of coastal erosion. [4 marks]",instructions:"Name the process, explain how it works, and link it to erosion.",model:"Hydraulic action occurs when waves force air and water into cracks in the rock. Pressure weakens the rock and eventually causes pieces to break away."},{marks:6,question:"Explain how erosion can cause cliff undercutting. [6 marks]",instructions:"Use destructive waves, hydraulic action, abrasion and wave-cut notch.",model:"Destructive waves attack the base of a cliff. Hydraulic action forces water and air into cracks, while abrasion scrapes the cliff with sediment. This undercuts the cliff and can form a wave-cut notch."}],practice:[{question:"Describe abrasion. [2 marks]",markPoints:["scrape","sand","pebbles","cliff"]},{question:"Explain hydraulic action. [4 marks]",markPoints:["waves","air","water","cracks","pressure","shatter"]}]},
{id:"transportation",title:"Processes of Transportation",intro:"Traction, saltation, suspension and solution.",notes:cb(`<h3>Transportation</h3><p>Material is moved by the sea before it is later deposited to form landforms such as beaches and spits.</p>`)+cb(`<h3>Traction</h3><p>Large rocks and heavy boulders are dragged or rolled along the sea bed.</p>`)+cb(`<h3>Saltation</h3><p>Smaller stones and pebbles bounce along the sea bed.</p>`)+cb(`<h3>Suspension</h3><p>Light material, such as sand grains, is carried within the water.</p>`)+cb(`<h3>Solution</h3><p>Dissolved minerals from rocks such as chalk and limestone are carried invisibly in the water.</p>`),flashcards:[["What is traction?","Large rocks are rolled along the sea bed."],["What is saltation?","Small stones bounce along the sea bed."],["What is suspension?","Light material is carried in the water."],["What is solution?","Dissolved minerals are carried in the water."]],examples:[{marks:4,question:"Describe two ways material is transported by the sea. [4 marks]",instructions:"Name two types and describe each one.",model:"Traction is when large rocks are rolled along the sea bed. Suspension is when light material such as sand is carried within the water."},{marks:6,question:"Explain how transportation helps form depositional landforms. [6 marks]",instructions:"Explain movement first, then deposition when energy falls.",model:"The sea transports sediment by traction, saltation, suspension and solution. When waves lose energy, this material is deposited. Over time, deposited material can build up to form landforms such as beaches and spits."}],practice:[{question:"Give two processes of transportation. [2 marks]",markPoints:["traction","saltation","suspension","solution"]}]},
{id:"waves",title:"Waves",intro:"Constructive waves, destructive waves, swash, backwash and fetch.",notes:cb(`<h3>How Waves Form</h3><p>Waves form when wind blows across the surface of the sea. Friction pushes water up to create waves. Wave power depends on wind speed and fetch, which is the distance wind has blown across open water.</p>`)+cb(`<h3>Constructive Waves</h3><p>Constructive waves are low, break gently and have a strong swash and weak backwash. They deposit material and help form beaches, spits, tombolos and bars.</p>`)+cb(`<h3>Destructive Waves</h3><p>Destructive waves are high and frequent, with a stronger backwash than swash. They erode the coastline and help form wave-cut platforms, headlands, bays, caves, arches, stacks and stumps.</p>`),flashcards:[["What is fetch?","The distance wind travels across open water."],["What is swash?","Water moving up the beach."],["What is backwash?","Water moving back down the beach."],["What do constructive waves do?","Deposit material."],["What do destructive waves do?","Erode the coastline."]],examples:[{marks:4,question:"Explain why waves with a long fetch are powerful. [4 marks]",instructions:"Link distance, energy and wave size.",model:"A long fetch means wind has blown across a large distance of open water. This gives waves more time to gain energy, making them larger and more powerful when they reach the coast."},{marks:6,question:"Compare constructive and destructive waves. [6 marks]",instructions:"Compare swash/backwash and effects on coast.",model:"Constructive waves have a strong swash and weak backwash, so they deposit material and build beaches. Destructive waves have a stronger backwash than swash, so they remove material and erode the coastline. Destructive waves are usually steeper and more frequent."}],practice:[{question:"Give two features of constructive waves. [2 marks]",markPoints:["strong swash","weak backwash","deposit","low"]},{question:"Explain how destructive waves erode the coast. [4 marks]",markPoints:["strong backwash","erosion","remove material","destructive"]}]},
{id:"erosional",title:"Erosional Landforms",intro:"Caves, arches, stacks, stumps, cliffs, wave-cut platforms, headlands and bays.",notes:cb(`<h3>Caves, Arches, Stacks and Stumps</h3><p>Waves exploit cracks in headlands. Hydraulic action widens cracks to form caves. Continued erosion can break through the headland to form an arch, such as Durdle Door. The roof of the arch eventually collapses, leaving a stack, such as Old Harry. The stack is undercut and collapses into a stump.</p>`)+cb(`<h3>Cliffs and Wave-Cut Platforms</h3><p>Destructive waves attack the base of cliffs, forming a wave-cut notch by hydraulic action and abrasion. The overhang collapses due to gravity. Waves remove debris and the process repeats, causing cliff retreat and leaving a wave-cut platform.</p>`)+cb(`<h3>Headlands and Bays</h3><p>Headlands and bays form where bands of resistant and less resistant rock alternate. Softer rock erodes faster to form bays, while harder rock remains as headlands. Examples include Flamborough Head and Lulworth Cove.</p>`),flashcards:[["How is a cave formed?","Hydraulic action widens cracks in a headland."],["How is an arch formed?","A cave erodes through a headland."],["How is a stack formed?","An arch roof collapses."],["What is a wave-cut platform?","A flat rocky surface left as a cliff retreats."],["How do headlands and bays form?","Softer rock erodes into bays; harder rock forms headlands."]],examples:[{marks:4,question:"Explain how a cave is formed. [4 marks]",instructions:"Use crack, hydraulic action and widening.",model:"A cave forms when waves attack a crack or weakness in a headland. Hydraulic action forces air and water into the crack, widening it over time until a cave forms."},{marks:6,question:"Explain how a stack is formed. [6 marks]",instructions:"Use crack, cave, arch, collapse and stack.",model:"Waves attack cracks in a headland by hydraulic action and abrasion. The crack widens into a cave, then erosion breaks through the headland to form an arch. The roof becomes unstable and collapses, leaving an isolated stack."},{marks:6,question:"Explain how a wave-cut platform forms. [6 marks]",instructions:"Use wave-cut notch, collapse, retreat and platform.",model:"Destructive waves attack the base of a cliff and form a wave-cut notch. The overhang becomes unsupported and collapses. Waves remove the fallen material and the cliff retreats. Over time, a flat wave-cut platform is left behind."}],practice:[{question:"Give two erosional landforms. [2 marks]",markPoints:["cave","arch","stack","stump","headland","bay","wave-cut platform"]},{question:"Explain how a wave-cut platform forms. [6 marks]",markPoints:["destructive waves","hydraulic action","abrasion","wave-cut notch","collapse","cliff retreat","platform"]}]},
{id:"depositional",title:"Depositional Landforms",intro:"Beaches, spits, tombolos and Spurn Point.",notes:cb(`<h3>Beaches</h3><p>Beaches are gently sloping areas between high and low water marks. They usually form in sheltered bays where headlands protect the area from erosion. Beaches are formed by constructive waves and may be made of sand, shingle or pebbles. Sandy beaches are usually gently sloping, while shingle beaches are steeper. Storm waves can create ridges called berms.</p>`)+cb(`<h3>Spits</h3><p>A spit is a long, narrow ridge of sand or shingle with one end attached to land and the other extending into the sea. Longshore drift carries sediment along the coast. Where the coastline changes direction or at an estuary, material is deposited and the spit grows. A hooked end can form if wind direction changes. Salt marshes may develop behind the spit.</p>`)+cb(`<h3>Case Study: Spurn Point</h3><p>Spurn Point is a narrow sand and shingle spit on the Yorkshire Coast. It extends into the North Sea at the mouth of the Humber Estuary. It is over 3 miles / 5 km long and can be as little as 45 metres wide. It is made from material eroded from the Holderness Coast and moved by longshore drift.</p>`),flashcards:[["What is a beach?","A gently sloping area between high and low water marks."],["What waves form beaches?","Constructive waves."],["What is a spit?","A long narrow ridge of sand or shingle attached to land at one end."],["How are spits formed?","By longshore drift and deposition."],["Give a UK spit example.","Spurn Point, Yorkshire."]],examples:[{marks:4,question:"Explain how constructive waves help form beaches. [4 marks]",instructions:"Use strong swash, weak backwash and deposition.",model:"Constructive waves have a strong swash and weak backwash. This means more sediment is pushed up the beach than taken away. Over time, deposited material builds up to form a beach."},{marks:6,question:"Explain how a spit is formed. [6 marks]",instructions:"Use longshore drift, coastline change, deposition and hooked end.",model:"Longshore drift transports sediment along the coast. When the coastline changes direction or reaches an estuary, waves lose energy and sediment is deposited. More sediment builds out into the sea, forming a spit. If wind direction changes, the end can become hooked."},{marks:9,question:"Assess the importance of longshore drift in forming depositional landforms. [9 marks]",instructions:"Use beaches, spits, Spurn Point and judgement.",model:"Longshore drift is very important because it transports sediment along the coast. Beaches can be supplied with sediment, while spits form when sediment is deposited where the coastline changes direction. Spurn Point formed from sand and shingle moved from the Holderness Coast by longshore drift. However, wave type, fetch and coastline shape also matter. Overall, longshore drift is especially important in spit formation."}],practice:[{question:"Give two materials beaches can be made from. [2 marks]",markPoints:["sand","shingle","pebbles"]},{question:"Explain how Spurn Point formed. [6 marks]",markPoints:["spurn point","holderness","longshore drift","sand","shingle","deposition","humber"]}]},
{id:"longshore",title:"Longshore Drift",intro:"The movement of sediment along the coastline.",notes:cb(`<h3>Longshore Drift</h3><p>Longshore drift is the movement of sand and pebbles along the coast. The prevailing wind makes waves approach the beach at an angle. Swash carries material up the beach at this angle, usually around 45 degrees. Backwash carries material straight back down the beach at 90 degrees because of gravity. This creates a zig-zag movement of sediment along the coastline.</p>`)+cb(`<h3>Direction</h3><p>The direction of longshore drift is controlled by the prevailing wind. Wind direction is described by where the wind comes from, not where it is going to.</p>`),flashcards:[["What is longshore drift?","The movement of sediment along the coast."],["What controls its direction?","The prevailing wind."],["What is swash?","Water moving up the beach at an angle."],["What is backwash?","Water moving back down the beach at right angles."],["What movement pattern is created?","A zig-zag movement along the coast."]],examples:[{marks:4,question:"Describe how longshore drift moves sediment. [4 marks]",instructions:"Use prevailing wind, swash and backwash.",model:"The prevailing wind causes waves to approach the coast at an angle. Swash carries sediment up the beach at this angle. Backwash then pulls material straight back down the beach. This creates a zig-zag movement along the coast."},{marks:6,question:"Explain why longshore drift is important for coastal landforms. [6 marks]",instructions:"Link transport to deposition and landforms.",model:"Longshore drift transports sediment along the coast. When waves lose energy, this sediment is deposited. This can help build beaches and can form spits where the coastline changes direction or at estuaries."}],practice:[{question:"Give two parts of longshore drift. [2 marks]",markPoints:["swash","backwash","prevailing wind"]},{question:"Explain longshore drift. [4 marks]",markPoints:["prevailing wind","angle","swash","backwash","zig-zag","sediment"]}]}
];
let currentTopic=null,cardIndex=0,flipped=false;
function renderMenu(){const grid=document.getElementById("topicGrid");grid.innerHTML="";topics.forEach(topic=>{const card=document.createElement("div");card.className="topic-card";card.innerHTML=`<h3>${topic.title}</h3><p>${topic.intro}</p><strong>Open topic →</strong>`;card.onclick=()=>openTopic(topic.id);grid.appendChild(card);});}
function openTopic(id){currentTopic=topics.find(t=>t.id===id);if(!currentTopic)return;cardIndex=0;flipped=false;document.getElementById("topicTitle").innerText=currentTopic.title;document.getElementById("topicIntro").innerText=currentTopic.intro;document.getElementById("notesContent").innerHTML=currentTopic.notes;renderFlashcard();renderExamples();renderPractice();resetTabs();document.getElementById("menuScreen").classList.remove("active");document.getElementById("topicScreen").classList.add("active");window.scrollTo(0,0);}
function goBack(){document.getElementById("topicScreen").classList.remove("active");document.getElementById("menuScreen").classList.add("active");window.scrollTo(0,0);}
function showTab(id,button){document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));document.getElementById(id).classList.add("active");button.classList.add("active");}
function resetTabs(){document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));document.getElementById("notesTab").classList.add("active");document.querySelector(".tabs button").classList.add("active");}
function renderFlashcard(){if(!currentTopic)return;const card=currentTopic.flashcards[cardIndex];document.getElementById("flashcardText").innerText=flipped?card[1]:card[0];}
function flipCard(){flipped=!flipped;renderFlashcard();}
function nextCard(){cardIndex=(cardIndex+1)%currentTopic.flashcards.length;flipped=false;renderFlashcard();}
function previousCard(){cardIndex=(cardIndex-1+currentTopic.flashcards.length)%currentTopic.flashcards.length;flipped=false;renderFlashcard();}
function renderExamples(){const box=document.getElementById("exampleContent");box.innerHTML=currentTopic.examples.map(example=>`<div class="exam-card"><span class="badge">${example.marks} marks</span><div class="exam-box"><h3>Question</h3><p>${example.question}</p></div><div class="exam-box"><h3>How to answer</h3><p>${example.instructions}</p></div><div class="exam-box"><h3>Model answer</h3><p>${example.model}</p></div></div>`).join("");}
function renderPractice(){const box=document.getElementById("practiceContent");box.innerHTML=currentTopic.practice.map((item,index)=>`<div class="exam-card"><div class="exam-box"><h3>Practice Question</h3><p>${item.question}</p><textarea id="answer${index}" rows="6" placeholder="Write your answer here..."></textarea><br><br><button onclick="markAnswer(${index})">Mark my answer</button><div id="feedback${index}"></div></div></div>`).join("");}
function markAnswer(index){const item=currentTopic.practice[index];const answer=document.getElementById(`answer${index}`).value.toLowerCase();const found=item.markPoints.filter(point=>answer.includes(point.toLowerCase()));const missing=item.markPoints.filter(point=>!answer.includes(point.toLowerCase()));document.getElementById(`feedback${index}`).innerHTML=`<div class="feedback score"><strong>Estimated score:</strong> ${found.length}/${item.markPoints.length}</div><div class="feedback www"><strong>WWW:</strong> You included: ${found.length?found.join(", "):"some relevant ideas"}.</div><div class="feedback ebi"><strong>EBI:</strong> Try to include: ${missing.length?missing.join(", "):"more developed explanation"}.</div>`;}
renderMenu();
</script>
</body>
</html>
